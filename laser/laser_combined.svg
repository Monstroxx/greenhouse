<?xml version="1.0" encoding="UTF-8"?>
<svg
  xmlns="http://www.w3.org/2000/svg"
  version="1.1"
  width="385.74mm"
  height="354.88mm"
  viewBox="0 0 385.74 354.88">
  <title>Laser Cut - 6x Panel + 2x Half-Hexagon</title>
  <!--
    Layout (2mm gap between parts):
    Panels: 3 columns x 2 rows  (73 x 176.44mm each)
    Half-hexagons: 2x side by side to the right (~79.37 x 159.74mm each)
    All strokes: fill=none, stroke=red 0.01mm (standard laser cut)
  -->

  <!-- ── PANELS (6x 73x176.44mm) ── -->

  <!-- Row 1, Col 1 -->
  <rect x="0" y="0" width="73" height="176.44"
        fill="none" stroke="#FF0000" stroke-width="0.01"/>
  <!-- Row 1, Col 2 -->
  <rect x="75" y="0" width="73" height="176.44"
        fill="none" stroke="#FF0000" stroke-width="0.01"/>
  <!-- Row 1, Col 3 -->
  <rect x="150" y="0" width="73" height="176.44"
        fill="none" stroke="#FF0000" stroke-width="0.01"/>
  <!-- Row 2, Col 1 -->
  <rect x="0" y="178.44" width="73" height="176.44"
        fill="none" stroke="#FF0000" stroke-width="0.01"/>
  <!-- Row 2, Col 2 -->
  <rect x="75" y="178.44" width="73" height="176.44"
        fill="none" stroke="#FF0000" stroke-width="0.01"/>
  <!-- Row 2, Col 3 -->
  <rect x="150" y="178.44" width="73" height="176.44"
        fill="none" stroke="#FF0000" stroke-width="0.01"/>

  <!-- ── HALF-HEXAGONS ── -->
  <!--
    Original coords normalized to start at 0,0:
    Left half:  M 79.368 0  L 79.368 159.738 L 0 120.054 L 0 39.684 Z
    Right half: M 0 0  L 79.367 39.684 L 79.367 120.054 L 0 159.738 Z
    Placed at x=225 and x=306.37, centered vertically in available height
  -->

  <!-- Left half-hexagon (placed at x=225, y=97.57 to vertically center) -->
  <path
    d="M 304.368 97.571 L 304.368 257.309 L 225 217.625 L 225 137.255 Z"
    fill="none" stroke="#FF0000" stroke-width="0.01"/>

  <!-- Right half-hexagon (placed at x=306.37, y=97.57) -->
  <path
    d="M 306.37 97.571 L 385.737 137.255 L 385.737 217.625 L 306.37 257.309 Z"
    fill="none" stroke="#FF0000" stroke-width="0.01"/>

</svg>
